services:
  app:
    build: .
    image: ghcr.io/keysiwin12/bot-wsp:latest
    container_name: whatsapp-bot
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - bot-data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  bot-data:
